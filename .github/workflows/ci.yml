name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Backend (.NET) ----
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore backend
        run: dotnet restore
      - name: Build backend
        run: dotnet build --configuration Release --no-restore
      - name: Test backend
        run: dotnet test --configuration Release --no-build

      # ---- Frontend (Node) ----
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: taskly-client/package-lock.json

      - name: Install frontend deps
        working-directory: taskly-client
        run: npm ci

      - name: Build frontend
        working-directory: taskly-client
        run: npm run build

      - name: Test frontend
        working-directory: taskly-client
        run: npm test -- --run
