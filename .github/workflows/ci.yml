name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      Jwt__Key: ${{ secrets.JWT_KEY }}  # maps to Jwt:Key in .NET

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Backend (.NET) ----
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore backend
        run: dotnet restore

      - name: Build backend
        run: dotnet build --configuration Release --no-restore

      - name: Test backend
        run: dotnet test --configuration Release --no-build

      # ---- Frontend (Node) ----
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: taskly-client/package-lock.json

      - name: Install frontend deps
        working-directory: taskly-client
        run: npm ci

      - name: Build frontend
        working-directory: taskly-client
        run: npm run build

      - name: Test frontend
        working-directory: taskly-client
        run: npm test -- --run

      # (optional) sanity check the env var is present
      - name: Check JWT env var present
        run: |
          if [ -z "$Jwt__Key" ]; then
            echo "Jwt__Key missing"; exit 1
          else
            echo "Jwt__Key set"
          fi
